<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rafael García Álvarez — Automation Engineer</title>
  <meta name="description" content="CV, redes y portfolio de Rafael García Álvarez, Automation Engineer especializado en infraestructura de sistemas, cloud y DevOps." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- Header / Navegación -->
  <header class="site-header" id="site-header">
    <div class="container header-inner">
      <a href="#hero" class="brand">RG<span class="brand-dot">.</span></a>

      <nav class="nav" id="nav">
        <a href="#about" data-i18n="nav.about">Sobre mí</a>
        <a href="#skills" data-i18n="nav.skills">Skills</a>
        <a href="#experience" data-i18n="nav.experience">Experiencia</a>
        <a href="#education" data-i18n="nav.education">Formación</a>
        <a href="#projects" data-i18n="nav.projects">Proyectos</a>
        <a href="#contact" data-i18n="nav.contact">Contacto</a>
      </nav>

      <div class="header-controls">
        <button class="btn-icon" id="lang-toggle" type="button" aria-label="Cambiar idioma">
          <span id="lang-label">EN</span>
        </button>
        <button class="btn-icon" id="theme-toggle" type="button" aria-label="Cambiar tema">
          <svg class="icon-sun" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
          <svg class="icon-moon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
        </button>
        <button class="btn-icon nav-toggle" id="nav-toggle" type="button" aria-label="Abrir menú" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <main>
    <!-- Hero -->
    <section id="hero" class="hero">
      <div class="container hero-inner">
        <div class="hero-text">
          <p class="hero-eyebrow reveal" data-i18n="hero.greeting">Hola, soy</p>
          <h1 class="hero-name reveal" id="hero-name">Rafael García Álvarez</h1>
          <p class="hero-role reveal" id="hero-role"></p>
          <p class="hero-tagline reveal" id="hero-tagline"></p>
          <div class="hero-actions reveal">
            <a href="#projects" class="btn btn-primary" data-i18n="hero.cta.projects">Ver proyectos</a>
            <a href="#contact" class="btn btn-ghost" data-i18n="hero.cta.contact">Contacto</a>
          </div>
          <div class="hero-social reveal" id="hero-social"></div>
        </div>
        <div class="hero-photo reveal">
          <img id="hero-avatar" src="" alt="Rafael García Álvarez" loading="eager" />
        </div>
      </div>
    </section>

    <!-- Sobre mí -->
    <section id="about" class="section">
      <div class="container">
        <h2 class="section-title reveal" data-i18n="section.about">Sobre mí</h2>
        <p class="about-text reveal" id="about-text"></p>
      </div>
    </section>

    <!-- Skills -->
    <section id="skills" class="section section-alt">
      <div class="container">
        <h2 class="section-title reveal" data-i18n="section.skills">Skills</h2>
        <div class="skills-grid" id="skills-grid"></div>
      </div>
    </section>

    <!-- Experiencia -->
    <section id="experience" class="section">
      <div class="container">
        <h2 class="section-title reveal" data-i18n="section.experience">Experiencia</h2>
        <div class="timeline" id="experience-list"></div>
      </div>
    </section>

    <!-- Formación -->
    <section id="education" class="section section-alt">
      <div class="container">
        <h2 class="section-title reveal" data-i18n="section.education">Formación</h2>
        <div class="timeline" id="education-list"></div>

        <h3 class="subsection-title reveal" data-i18n="section.courses">Cursos y certificaciones</h3>
        <div class="courses-grid" id="courses-list"></div>
      </div>
    </section>

    <!-- Proyectos -->
    <section id="projects" class="section">
      <div class="container">
        <h2 class="section-title reveal" data-i18n="section.projects">Proyectos</h2>
        <div class="projects-grid" id="projects-list"></div>
      </div>
    </section>

    <!-- Contacto -->
    <section id="contact" class="section section-alt">
      <div class="container contact-inner">
        <h2 class="section-title reveal" data-i18n="section.contact">Contacto</h2>
        <p class="contact-text reveal" data-i18n="contact.text">¿Hablamos? Escríbeme o encuéntrame en mis redes.</p>
        <div class="contact-social reveal" id="contact-social"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© <span id="year"></span> Rafael García Álvarez</p>
    </div>
  </footer>

  <script src="js/main.js" type="module"></script>
</body>
</html>
